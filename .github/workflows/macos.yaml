name: MacOS

on:
  push:
    branches: [main, feat/chezmoi]
    paths:
      - ".github/workflows/macos.yaml"
      - "setup.sh"
      - "install/macos/**"
      - "home/.chezmoiscripts/macos/**"
      - "home/dot_tmux.conf.d/os/macos.conf"
      - "tests/install/macos/**"

  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/macos.yaml"
      - "setup.sh"
      - "install/macos/**"
      - "home/.chezmoiscripts/macos/**"
      - "home/dot_tmux.conf.d/os/macos.conf"
      - "tests/install/macos/**"

jobs:
  build:
    # This workflow requires private repository access and benchmark token.
    # Skip known secret-less contexts to avoid failing at SSH setup.
    if: ${{ github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: macos-14 # M1 Mac
    env:
      # DOTFILES_DEBUG: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Set up SSH agent and add the private deploy key for the private dotfiles repo
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.PRIVATE_DOTFILES_PRIVATE_DEPLOY_KEY }}

      - name: Setup dotfiles
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # for avoiding rate limit of GitHub API
        run: |
          if [ "${EVENT_NAME}" == "push" ]; then
            BRANCH_NAME="${{ github.ref_name }}"
          elif [ "${EVENT_NAME}" == "pull_request" ]; then
            BRANCH_NAME="${{ github.head_ref }}"
          fi
          export BRANCH_NAME

          URL="https://raw.githubusercontent.com/mukasun/dotfiles/${BRANCH_NAME}/setup.sh"
          echo "Download setup.sh from ${URL}"

          printf "${EMAIL_ADDRESS}\n" | bash -c "$(curl -fsLS $URL)"
          #              │
          #              └─ Simulate inputting an email address into the chezmoi's config.

      - name: Unset gpg
        run: |
          git config --global commit.gpgsign false

      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Test file existence
        run: |
          brew install bats-core

          cd $(chezmoi source-path)/../
          bats --print-output-on-failure \
            tests/files/common.bats \
            tests/files/macos.bats
